    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        
        /* Système d'infobulles optimisé pour ne pas être coupé */
        .custom-tooltip-container { position: relative; display: inline-flex; align-items: center; cursor: help; }
        .custom-tooltip-content { 
            visibility: hidden; opacity: 0; position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%); 
            width: max-content; max-width: 250px; background-color: #1e293b; color: white; text-align: center; 
            border-radius: 8px; padding: 10px; font-size: 11px; z-index: 9999; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
            white-space: normal; line-height: 1.4; transition: all 0.2s ease;
        }
        .custom-tooltip-content::after { 
            content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); 
            border-width: 6px; border-style: solid; border-color: #1e293b transparent transparent transparent; 
        }
        .custom-tooltip-container:hover .custom-tooltip-content { visibility: visible; opacity: 1; bottom: 130%; }
        
        /* Retrait du overflow-hidden destructeur pour les bulles */
        .card-container { overflow: visible !important; }
    </style>
</head>

                if (this.state.hasError) {

                            <pre className="bg-white p-4 rounded shadow overflow-auto text-sm">{this.state.error.toString()}</pre>

                    );
                }
                return this.props.children;
            }

                          </div>

                          <div className="grid grid-cols-2 gap-4 mt-2">
                            <div className="p-4 bg-green-50 border border-green-100 rounded-xl">
                              <p className="text-[10px] font-black uppercase text-green-600 mb-1">Points Forts</p>
                              <p className="text-xs font-medium text-green-800 leading-relaxed">Capacité défensive très forte. Vision du jeu (passes) en progression constante.</p>
                            </div>
                            <div className="p-4 bg-amber-50 border border-amber-100 rounded-xl">
                              <p className="text-[10px] font-black uppercase text-amber-600 mb-1">Points Faibles</p>
                              <p className="text-xs font-medium text-amber-800 leading-relaxed">Tendance à garder la balle trop longtemps face aux grands gabarits (U9).</p>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* === ONGLET 4: CALENDRIER & RÉSULTATS === */}
                {activeTab === 'calendar' && (
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    
                    {/* Colonne Gauche: Passé interactif */}
                    <Card title="Événements Passés & Résultats (Cliquez pour détails)" icon={Award}>
                      <div className="space-y-4">
                        {pastEvents.map((ev, i) => (
                          ev.isHeader ? (
                            <h4 key={i} className="text-[10px] font-black uppercase tracking-widest text-slate-400 pt-4 border-b border-slate-200 pb-1">{ev.title}</h4>
                          ) : (
                          <div key={i} className="border border-slate-200 rounded-2xl overflow-hidden bg-slate-50/50 hover:border-slate-300 transition-colors shadow-sm">
                            <div 
                              className="p-4 flex items-center justify-between cursor-pointer"
                              onClick={() => setExpandedEventIndex(expandedEventIndex === i ? null : i)}
                            >
                              <div className="flex items-center gap-4">
                                <div className={`w-10 h-10 rounded-full flex items-center justify-center shrink-0 ${ev.color}`}>
                                  <ev.icon size={18} />
                                </div>
                                <div>
                                  <p className="text-sm font-black text-slate-800">{ev.name}</p>
                                  <p className="text-[10px] font-bold text-slate-400 uppercase mt-0.5">{ev.date} • {ev.sport}</p>
                                </div>
                              </div>
                              <div className="flex items-center gap-2">
                                <span className={`text-[9px] font-black uppercase px-2 py-1 rounded border whitespace-nowrap hidden sm:block ${
                                  ev.result.includes('Or') || ev.result.includes('Victoire') || ev.result.includes('Buteur') ? 'border-yellow-400 text-yellow-700 bg-yellow-50' :
                                  ev.result.includes('DSQ') || ev.result.includes('Défaite') ? 'border-red-400 text-red-600 bg-red-50' : 'border-indigo-200 text-indigo-600 bg-indigo-50'
                                }`}>
                                  {ev.result}
                                </span>
                                <div className="bg-white p-1 rounded-full border border-slate-200">
                                  {expandedEventIndex === i ? <ChevronUp size={16} className="text-slate-400"/> : <ChevronDown size={16} className="text-slate-400"/>}
                                </div>
                              </div>
                            </div>
                            {/* Version Mobile du tag */}
                            <div className="px-4 pb-3 sm:hidden text-right block border-t border-slate-100 pt-2">
                               <span className={`text-[9px] font-black uppercase px-2 py-1 rounded border whitespace-nowrap ${
                                  ev.result.includes('Or') || ev.result.includes('Victoire') || ev.result.includes('Buteur') ? 'border-yellow-400 text-yellow-700 bg-yellow-50' :
                                  ev.result.includes('DSQ') || ev.result.includes('Défaite') ? 'border-red-400 text-red-600 bg-red-50' : 'border-indigo-200 text-indigo-600 bg-indigo-50'
                                }`}>
                                  {ev.result}
                                </span>
                            </div>
                            {/* Description technique */}
                            {expandedEventIndex === i && (
                              <div className="p-4 bg-white border-t border-slate-200 text-[12px] font-medium text-slate-600 leading-relaxed shadow-inner">
                                {ev.desc}
                              </div>
                            )}
                          </div>
                          )
                        ))}
                      </div>
                    </Card>

                    {/* Colonne Droite: À venir */}
                    <Card title="Calendrier Prévisionnel" icon={Calendar}>
                      <div className="relative border-l-2 border-slate-200 ml-3 space-y-4 pb-4">
                        {futureEvents.map((ev, i) => (
                          ev.isHeader ? (
                            <div key={i} className="absolute -left-[18px] mt-4 bg-white border border-slate-200 shadow-sm px-2 py-1 rounded text-[10px] font-black uppercase tracking-widest text-slate-500 z-10">
                              {ev.title}
                            </div>
                          ) : (
                          <div key={i} className="relative pl-6 pt-6">
                            <div className="absolute -left-[9px] top-[34px] w-4 h-4 rounded-full border-4 border-white bg-slate-300"></div>
                            <div className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex items-start gap-4">
                                <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 bg-slate-50 border border-slate-100 ${ev.color}`}>
                                  <ev.icon size={14} />
                                </div>
                                <div className="w-full">
                                  <div className="flex justify-between items-start mb-2">
                                    <div>
                                      <h4 className="text-sm font-black text-slate-800">{ev.name}</h4>
                                      <p className="text-[10px] font-black text-slate-400 uppercase mt-0.5">{ev.sport}</p>
                                    </div>
                                    <span className="text-[10px] font-bold text-slate-500 bg-slate-100 border border-slate-200 px-2 py-0.5 rounded whitespace-nowrap">{ev.date}</span>
                                  </div>
                                  <div className="flex justify-between items-center pt-2 border-t border-slate-50">
                                    <p className="text-[10px] font-bold text-slate-500 flex items-center gap-1"><Clock size={12}/> {ev.info}</p>
                                    <span className={`text-[9px] font-black uppercase px-2 py-0.5 rounded border ${ev.inscrit ? 'bg-green-50 text-green-600 border-green-200' : 'bg-yellow-50 text-yellow-600 border-yellow-200'}`}>
                                      {ev.inscrit ? 'Inscrit' : 'Non Inscrit'}
                                    </span>
                                  </div>
                                </div>
                            </div>
                          </div>
                          )
                        ))}
                      </div>
                    </Card>
                  </div>
                )}

                {/* === ONGLET 5: STRATÉGIE === */}
                {activeTab === 'strategy' && (
                  <div className="space-y-6">
                    <div className="bg-gradient-to-br from-slate-900 to-slate-800 text-white rounded-[2rem] p-8 shadow-2xl relative overflow-hidden">
                      <div className="absolute top-0 right-0 p-8 opacity-10"><Compass size={150}/></div>
                      <div className="relative z-10 max-w-3xl">
                        <h2 className="text-sm font-black uppercase tracking-widest text-indigo-400 mb-4">Postulat Stratégique Majeur</h2>
                        <p className="text-2xl md:text-3xl font-black leading-tight mb-6">
                          "Ce n'est pas la performance brute qui progresse aujourd'hui... <span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-emerald-400">c'est la structure du sportif.</span>"
                        </p>
                        <ul className="space-y-2 text-sm text-slate-300 font-medium">
                          <li className="flex items-center gap-2"><CheckCircle2 size={16} className="text-emerald-400"/> Autonomie mentale validée en compétition.</li>
                          <li className="flex items-center gap-2"><CheckCircle2 size={16} className="text-emerald-400"/> Identité technique en pleine construction.</li>
                          <li className="flex items-center gap-2"><CheckCircle2 size={16} className="text-emerald-400"/> Explosivité naturelle physiologique confirmée.</li>
                          <li className="flex items-center gap-2"><AlertCircle size={16} className="text-amber-400"/> Seule limite : souplesse limite à surveiller.</li>
                        </ul>
                      </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                      <Card className="border-t-4 border-t-emerald-500">
                        <div className="mb-4">
                          <span className="px-3 py-1 bg-emerald-100 text-emerald-800 rounded-lg text-[10px] font-black uppercase tracking-widest">Court Terme (Trimestre)</span>
                        </div>
                        <h3 className="text-lg font-black mb-4">Nettoyage Technique</h3>
                        <ul className="space-y-3 text-xs text-slate-600 font-medium">
                          <li className="flex gap-2 items-start"><ArrowRight size={14} className="text-emerald-500 shrink-0 mt-0.5"/> Consolider le Ko-Soto-Gari (Judo).</li>
                          <li className="flex gap-2 items-start"><ArrowRight size={14} className="text-emerald-500 shrink-0 mt-0.5"/> Stabiliser la mécanique de rotation (Hanche).</li>
                          <li className="flex gap-2 items-start"><ArrowRight size={14} className="text-emerald-500 shrink-0 mt-0.5"/> Finir "propre" au mur en natation.</li>
                        </ul>
                      </Card>

                      <Card className="border-t-4 border-t-blue-500">
                        <div className="mb-4">
                          <span className="px-3 py-1 bg-blue-100 text-blue-800 rounded-lg text-[10px] font-black uppercase tracking-widest">Moyen Terme (Saison)</span>
                        </div>
                        <h3 className="text-lg font-black mb-4">Adversité & Physique</h3>
                        <ul className="space-y-3 text-xs text-slate-600 font-medium">
                          <li className="flex gap-2 items-start"><ArrowRight size={14} className="text-blue-500 shrink-0 mt-0.5"/> Affronter volontairement une adversité dense.</li>
                          <li className="flex gap-2 items-start"><ArrowRight size={14} className="text-blue-500 shrink-0 mt-0.5"/> Lâcher la balle plus vite (Handball).</li>
                          <li className="flex gap-2 items-start"><ArrowRight size={14} className="text-blue-500 shrink-0 mt-0.5"/> Augmenter l'explosivité verticale pure.</li>
                        </ul>
                      </Card>

                      <Card className="border-t-4 border-t-purple-600">
                        <div className="mb-4">
                          <span className="px-3 py-1 bg-purple-100 text-purple-800 rounded-lg text-[10px] font-black uppercase tracking-widest">Long Terme (2 ans +)</span>
                        </div>
                        <h3 className="text-lg font-black mb-4">Construction Identitaire</h3>
                        <ul className="space-y-3 text-xs text-slate-600 font-medium">
                          <li className="flex gap-2 items-start"><ArrowRight size={14} className="text-purple-600 shrink-0 mt-0.5"/> Construire un profil basé sur le "déséquilibre intelligent".</li>
                          <li className="flex gap-2 items-start"><ArrowRight size={14} className="text-purple-600 shrink-0 mt-0.5"/> Maintien obligatoire du modèle multisport jusqu'en U11.</li>
                        </ul>
                      </Card>
                    </div>
                  </div>
                )}
              </main>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
