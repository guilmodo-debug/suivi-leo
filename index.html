                      </div>
                    </div>
                  </div>
                )}

                {/* === ONGLET 4: CALENDRIER & RÉSULTATS === */}
                {activeTab === 'calendar' && (
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 animate-in fade-in duration-500">
                    {/* PASSED EVENTS */}
                    <Card title="Événements Passés & Résultats" icon={Award}>
                      <div className="space-y-4">
                        {pastEvents.map((monthGrp, mIdx) => (
                          <div key={mIdx} className="space-y-3">
                            <div className="flex items-center gap-3 pt-2 pb-1">
                               <h4 className="text-[10px] font-black uppercase tracking-widest text-slate-400">{monthGrp.month}</h4>
                               <div className="flex-1 border-b border-slate-200"></div>
                            </div>
                            {monthGrp.events.map((ev, i) => {
                              const globalIndex = mIdx * 100 + i;
                              const isExp = expandedPast === globalIndex;
                              return (
                              <div key={i} className="border border-slate-200 rounded-2xl overflow-hidden bg-slate-50 hover:border-slate-300 transition-colors shadow-sm">
                                <div className="p-4 flex items-center justify-between cursor-pointer" onClick={() => setExpandedPast(isExp ? null : globalIndex)}>
                                  <div className="flex items-center gap-4">
                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center shrink-0 ${ev.bgColor} ${ev.color}`}><ev.icon size={18} /></div>
                                    <div><p className="text-sm font-black text-slate-800">{ev.name}</p><p className="text-[10px] font-bold text-slate-500 uppercase mt-0.5">{ev.date} • {ev.sport}</p></div>
                                  </div>
                                  <div className="flex items-center gap-2">
                                    <span className={`text-[9px] font-black uppercase px-2 py-1 rounded border whitespace-nowrap hidden sm:block ${ev.result === '1ER' || ev.result.includes('1er') ? 'border-yellow-400 text-yellow-700 bg-yellow-50' : ev.result === 'DSQ' ? 'border-red-400 text-red-600 bg-red-50' : 'border-slate-200 text-slate-600 bg-white'}`}>{ev.result}</span>
                                    <div className="bg-white p-1 rounded-full border border-slate-200">{isExp ? <ChevronUp size={16} className="text-slate-400"/> : <ChevronDown size={16} className="text-slate-400"/>}</div>
                                  </div>
                                </div>
                                <div className="px-4 pb-3 sm:hidden text-right block border-t border-slate-100 pt-2">
                                   <span className={`text-[9px] font-black uppercase px-2 py-1 rounded border whitespace-nowrap ${ev.result === '1ER' || ev.result.includes('1er') ? 'border-yellow-400 text-yellow-700 bg-yellow-50' : ev.result === 'DSQ' ? 'border-red-400 text-red-600 bg-red-50' : 'border-slate-200 text-slate-600 bg-white'}`}>{ev.result}</span>
                                </div>
                                {isExp && (
                                  <div className="p-4 bg-white border-t border-slate-200 shadow-inner grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div><p className="text-[9px] uppercase font-black text-slate-400 mb-1">Adversité</p><div className="flex">{renderStars(ev.adv)}</div></div>
                                    <div><p className="text-[9px] uppercase font-black text-slate-400 mb-1">Volume</p><p className="text-xs font-bold text-slate-700">{ev.matches}</p></div>
                                    <div className="md:col-span-2"><p className="text-[9px] uppercase font-black text-slate-400 mb-1">Résumé</p><p className="text-xs font-medium text-slate-600 leading-relaxed">{ev.desc}</p></div>
                                    <div className="md:col-span-2"><p className="text-[9px] uppercase font-black text-slate-400 mb-1">Commentaire Technique</p><p className="text-xs font-medium text-slate-600 leading-relaxed italic border-l-2 border-indigo-200 pl-2">{ev.com}</p></div>
                                  </div>
                                )}
                              </div>
                            )})}
                          </div>
                        ))}
                      </div>
                    </Card>

                    {/* FUTURE EVENTS */}
                    <Card title="Événements à venir" icon={Calendar}>
                      <div className="space-y-4">
                        {futureEvents.map((monthGrp, mIdx) => (
                          <div key={mIdx} className="space-y-3">
                            <div className="flex items-center gap-3 pt-2 pb-1">
                               <h4 className="text-[10px] font-black uppercase tracking-widest text-slate-400">{monthGrp.month}</h4>
                               <div className="flex-1 border-b border-slate-200"></div>
                            </div>
                            {monthGrp.events.map((ev, i) => {
                              const globalIndex = mIdx * 100 + i;
                              const isExp = expandedFuture === globalIndex;
                              return (
                              <div key={i} className="border border-slate-200 rounded-2xl overflow-hidden bg-slate-50 hover:border-slate-300 transition-colors shadow-sm">
                                <div className="p-4 flex items-center justify-between cursor-pointer" onClick={() => setExpandedFuture(isExp ? null : globalIndex)}>
                                  <div className="flex items-center gap-4">
                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center shrink-0 bg-white shadow-sm ${ev.color}`}><ev.icon size={18} /></div>
                                    <div><p className="text-sm font-black text-slate-800">{ev.name}</p><p className="text-[10px] font-bold text-slate-500 uppercase mt-0.5">{ev.date} • {ev.sport}</p></div>
                                  </div>
                                  <div className="flex items-center gap-2">
                                    <span className={`text-[9px] font-black uppercase px-2 py-1 rounded border whitespace-nowrap hidden sm:block ${ev.status === 'INSCRIT' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-yellow-50 text-yellow-700 border-yellow-200'}`}>{ev.status}</span>
                                    <div className="bg-white p-1 rounded-full border border-slate-200">{isExp ? <ChevronUp size={16} className="text-slate-400"/> : <ChevronDown size={16} className="text-slate-400"/>}</div>
                                  </div>
                                </div>
                                <div className="px-4 pb-3 sm:hidden text-right block border-t border-slate-100 pt-2">
                                   <span className={`text-[9px] font-black uppercase px-2 py-1 rounded border whitespace-nowrap ${ev.status === 'INSCRIT' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-yellow-50 text-yellow-700 border-yellow-200'}`}>{ev.status}</span>
                                </div>
                                {isExp && (
                                  <div className="p-4 bg-white border-t border-slate-200 shadow-inner grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div><p className="text-[9px] uppercase font-black text-slate-400 mb-1">Horaires</p><p className="text-xs font-bold text-slate-700 flex items-center gap-1"><Clock size={12}/>{ev.time}</p></div>
                                    <div><p className="text-[9px] uppercase font-black text-slate-400 mb-1">Logistique</p><p className="text-xs font-bold text-slate-700 flex items-center gap-1">🚗 {ev.drive}</p></div>
                                    <div className="md:col-span-2"><p className="text-[9px] uppercase font-black text-slate-400 mb-1">Lieu Exact</p><p className="text-xs font-medium text-slate-600 flex items-start gap-1"><MapPin size={12} className="shrink-0 mt-0.5"/>{ev.address}</p></div>
                                  </div>
                                )}
                              </div>
                            )})}
                          </div>
                        ))}
                      </div>
                    </Card>
                  </div>
                )}

                {/* === ONGLET 5: STRATÉGIE === */}
                {activeTab === 'strategy' && (
                  <div className="space-y-6 animate-in fade-in duration-500">
                    <div className="bg-gradient-to-br from-slate-900 to-slate-800 text-white rounded-[2rem] p-8 shadow-2xl relative overflow-hidden">
                      <div className="absolute top-0 right-0 p-8 opacity-10"><Compass size={150}/></div>
                      <div className="relative z-10 max-w-3xl">
                        <h2 className="text-sm font-black uppercase tracking-widest text-indigo-400 mb-4">Postulat Stratégique Majeur</h2>
                        <p className="text-2xl md:text-3xl font-black leading-tight mb-6">
                          "Ce n'est pas la performance brute qui progresse aujourd'hui... <span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-emerald-400">c'est la structure du sportif.</span>"
                        </p>
                        <ul className="space-y-2 text-sm text-slate-300 font-medium">
                          <li className="flex items-center gap-2"><CheckCircle2 size={16} className="text-emerald-400"/> Autonomie mentale validée en compétition.</li>
                          <li className="flex items-center gap-2"><CheckCircle2 size={16} className="text-emerald-400"/> Identité technique en pleine construction.</li>
                          <li className="flex items-center gap-2"><CheckCircle2 size={16} className="text-emerald-400"/> Explosivité physiologique naturelle confirmée.</li>
                        </ul>
                      </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                      <Card className="border-t-4 border-t-emerald-500">
                        <div className="mb-4"><span className="px-3 py-1 bg-emerald-100 text-emerald-800 rounded-lg text-[10px] font-black uppercase tracking-widest">Court Terme (Trimestre)</span></div>
                        <h3 className="text-lg font-black mb-4">Nettoyage Technique</h3>
                        <ul className="space-y-3 text-xs text-slate-600 font-medium">
                          <li className="flex gap-2 items-start"><ArrowRight size={14} className="text-emerald-500 shrink-0 mt-0.5"/> Consolider l'Ashi-Waza (Judo).</li>
                          <li className="flex gap-2 items-start"><ArrowRight size={14} className="text-emerald-500 shrink-0 mt-0.5"/> Stabiliser la mécanique de rotation (Hanche).</li>
                          <li className="flex gap-2 items-start"><ArrowRight size={14} className="text-emerald-500 shrink-0 mt-0.5"/> Finir "propre" au mur en natation.</li>
                        </ul>
                      </Card>
                      <Card className="border-t-4 border-t-blue-500">
                        <div className="mb-4"><span className="px-3 py-1 bg-blue-100 text-blue-800 rounded-lg text-[10px] font-black uppercase tracking-widest">Moyen Terme (Saison)</span></div>
                        <h3 className="text-lg font-black mb-4">Adversité & Physique</h3>
                        <ul className="space-y-3 text-xs text-slate-600 font-medium">
                          <li className="flex gap-2 items-start"><ArrowRight size={14} className="text-blue-500 shrink-0 mt-0.5"/> Affronter volontairement une adversité dense.</li>
                          <li className="flex gap-2 items-start"><ArrowRight size={14} className="text-blue-500 shrink-0 mt-0.5"/> Lâcher la balle plus vite (Handball U9).</li>
                          <li className="flex gap-2 items-start"><ArrowRight size={14} className="text-blue-500 shrink-0 mt-0.5"/> Augmenter l'explosivité verticale pure.</li>
                        </ul>
                      </Card>
                      <Card className="border-t-4 border-t-indigo-500">
                        <div className="mb-4"><span className="px-3 py-1 bg-indigo-100 text-indigo-800 rounded-lg text-[10px] font-black uppercase tracking-widest">Long Terme (2 ans +)</span></div>
                        <h3 className="text-lg font-black mb-4">Construction Identitaire</h3>
                        <ul className="space-y-3 text-xs text-slate-600 font-medium">
                          <li className="flex gap-2 items-start"><ArrowRight size={14} className="text-indigo-500 shrink-0 mt-0.5"/> Construire un profil de "déséquilibre intelligent".</li>
                          <li className="flex gap-2 items-start"><ArrowRight size={14} className="text-indigo-500 shrink-0 mt-0.5"/> Maintien strict du modèle multisport jusqu'en U11.</li>
                        </ul>
                      </Card>
                    </div>

                    <Card title="Probabilités Statistiques d'Accès à l'Élite (Filtre Pyramidal)" icon={Target}>
                       <p className="text-xs text-slate-500 mb-6">Indicateurs théoriques moyens du parcours d'accès au Haut Niveau (basés sur le volume de licenciés fédéraux). Justifie la stratégie de ne pas spécialiser un athlète avant 12 ans pour ne pas brûler les étapes.</p>
                       <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                          <div className="p-5 border border-red-100 rounded-2xl bg-red-50/50 text-center">
                             <div className="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center text-red-600 mx-auto mb-3"><JudoIcon size={20}/></div>
                             <h4 className="font-black text-red-900 mb-4">JUDO</h4>
                             <div className="space-y-2 text-xs">
                               <div className="flex justify-between border-b border-red-100 pb-1"><span className="text-slate-600 font-medium">Pôle Espoir (15 ans)</span><span className="font-black text-red-600">~2.0%</span></div>
                               <div className="flex justify-between border-b border-red-100 pb-1"><span className="text-slate-600 font-medium">Pôle France / INSEP</span><span className="font-black text-red-600">~0.2%</span></div>
                               <div className="flex justify-between"><span className="text-slate-600 font-medium">Élite Internationale</span><span className="font-black text-red-600">0.01%</span></div>
                             </div>
                          </div>
                          <div className="p-5 border border-orange-100 rounded-2xl bg-orange-50/50 text-center">
                             <div className="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center text-orange-600 mx-auto mb-3"><BallIcon size={20}/></div>
                             <h4 className="font-black text-orange-900 mb-4">HANDBALL</h4>
                             <div className="space-y-2 text-xs">
                               <div className="flex justify-between border-b border-orange-100 pb-1"><span className="text-slate-600 font-medium">Centre Formation</span><span className="font-black text-orange-600">~1.0%</span></div>
                               <div className="flex justify-between border-b border-orange-100 pb-1"><span className="text-slate-600 font-medium">Joueur Pro (D1/D2)</span><span className="font-black text-orange-600">~0.1%</span></div>
                               <div className="flex justify-between"><span className="text-slate-600 font-medium">Élite Internationale</span><span className="font-black text-orange-600">0.005%</span></div>
                             </div>
                          </div>
                          <div className="p-5 border border-blue-100 rounded-2xl bg-blue-50/50 text-center">
                             <div className="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 mx-auto mb-3"><Waves size={20}/></div>
                             <h4 className="font-black text-blue-900 mb-4">NATATION</h4>
                             <div className="space-y-2 text-xs">
                               <div className="flex justify-between border-b border-blue-100 pb-1"><span className="text-slate-600 font-medium">Niveau N2 / Interreg.</span><span className="font-black text-blue-600">~3.0%</span></div>
                               <div className="flex justify-between border-b border-blue-100 pb-1"><span className="text-slate-600 font-medium">Niveau N1 / Élite</span><span className="font-black text-blue-600">~0.5%</span></div>
                               <div className="flex justify-between"><span className="text-slate-600 font-medium">Élite Internationale</span><span className="font-black text-blue-600">0.02%</span></div>
                             </div>
                          </div>
                       </div>
                    </Card>
                  </div>
                )}
              </main>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
