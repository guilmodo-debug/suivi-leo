        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-8 text-red-500 bg-red-50 min-h-screen">
                            <h1 className="text-2xl font-bold mb-4">Une erreur est survenue :</h1>
                            <pre className="bg-white p-4 rounded shadow overflow-auto text-sm">{this.state.error.toString()}</pre>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

                    </Card>

                    {/* Colonne Droite: À venir */}
                    <Card title="Calendrier Prévisionnel" icon={Calendar}>
                      <div className="relative border-l-2 border-slate-200 ml-3 space-y-4 pb-4">
                        {futureEvents.map((ev, i) => (
                          ev.isHeader ? (
                            <div key={i} className="absolute -left-3 mt-2 bg-slate-100 px-2 py-1 rounded text-[10px] font-black uppercase tracking-widest text-slate-500 z-10">
                              {ev.title}
                            </div>
                          ) : (
                          <div key={i} className="relative pl-6 pt-6">
                            <div className="absolute -left-[9px] top-8 w-4 h-4 rounded-full border-4 border-white bg-slate-300"></div>
                            <div className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                              <div className="flex justify-between items-start mb-2">
                                <div>
                                  <h4 className="text-sm font-black text-slate-800">{ev.name}</h4>
                                  <p className="text-[10px] font-black text-slate-400 uppercase mt-0.5">{ev.sport}</p>
                                </div>
                                <span className="text-xs font-bold text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded whitespace-nowrap">{ev.date}</span>
                              </div>
                              <div className="flex justify-between items-center pt-2 border-t border-slate-50">
                                <p className="text-xs font-bold text-slate-500 flex items-center gap-1"><Clock size={12}/> {ev.info}</p>
                                <span className={`text-[9px] font-black uppercase px-2 py-0.5 rounded ${ev.inscrit ? 'bg-green-100 text-green-600' : 'bg-slate-100 text-slate-500'}`}>
                                  {ev.inscrit ? 'Inscrit' : 'Non Inscrit'}
                                </span>
                              </div>
                            </div>
                          </div>
                          )
                        ))}
                      </div>
                    </Card>
                  </div>
                )}

              </main>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
