<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LÉO · ATHLETE OS V3</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,500;0,700;0,800;0,900;1,800&family=Barlow:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.0/Recharts.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js"></script>

<style>
:root {
  --bg-base:#070a10; --bg-surface:#0d1117; --bg-card:#111827; --bg-card-hover:#161f2e;
  --border:#1e2d3d; --border-bright:#2d3f55;
  --text-primary:#f0f4f8; --text-secondary:#8fa3b8; --text-muted:#4a6070;
  --judo-gold:#f5c518; --judo-gold-dim:rgba(245,197,24,0.12);
  --swim-cyan:#00d4ff; --swim-cyan-dim:rgba(0,212,255,0.10);
  --hand-orange:#ff6b2b; --hand-orange-dim:rgba(255,107,43,0.10);
  --danger:#ff3e3e; --success:#00e57e; --neutral:#7c9cbf;
  --amber:#ffab00;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg-base);color:var(--text-primary)}
body{font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg-base)}
::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:2px}

body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
  opacity:0.025}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px)}
#root{position:relative;z-index:1}

/* LAYOUT */
.os-layout{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:72px;min-height:100vh;background:var(--bg-surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;padding:24px 0;gap:6px;
  position:fixed;left:0;top:0;z-index:100}
.sidebar-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:14px;
  letter-spacing:2px;color:var(--text-primary);writing-mode:vertical-rl;text-orientation:mixed;
  transform:rotate(180deg);margin-bottom:20px;padding-bottom:20px;
  border-bottom:1px solid var(--border);width:100%;display:flex;justify-content:center}

.nav-btn{width:48px;height:48px;display:flex;align-items:center;justify-content:center;
  border-radius:12px;border:1px solid transparent;cursor:pointer;transition:all 0.2s;
  color:var(--text-muted);background:transparent;position:relative}
.nav-btn:hover{color:var(--text-primary);background:var(--bg-card);border-color:var(--border)}
.nav-btn.active{color:var(--text-primary);background:var(--bg-card);border-color:var(--border-bright)}
.nav-btn.active::before{content:'';position:absolute;left:-1px;top:50%;transform:translateY(-50%);
  width:3px;height:24px;border-radius:0 2px 2px 0;background:var(--judo-gold)}
.nav-btn.active.swim::before{background:var(--swim-cyan)}
.nav-btn.active.hand::before{background:var(--hand-orange)}
.nav-btn.active.cal::before{background:var(--success)}
.nav-btn.active.tl::before{background:var(--neutral)}
.nav-btn.active.bio::before{background:var(--amber)}

.nav-tooltip{position:absolute;left:calc(100% + 12px);top:50%;transform:translateY(-50%);
  background:var(--bg-card);border:1px solid var(--border-bright);color:var(--text-primary);
  padding:6px 12px;border-radius:8px;white-space:nowrap;
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;
  pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:200}
.nav-btn:hover .nav-tooltip{opacity:1}

.main-content{margin-left:72px;flex:1;padding:28px 32px;min-height:100vh}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.topbar-section-name{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;color:var(--text-muted)}
.topbar-title{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:900;
  letter-spacing:-0.5px;color:var(--text-primary);line-height:1;margin-top:2px}

.status-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;
  border:1px solid var(--border);color:var(--text-secondary)}
.status-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.3}}

/* CARD */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:24px;
  position:relative;overflow:hidden;transition:border-color 0.2s}
.card:hover{border-color:var(--border-bright)}
.card-label{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px}
.card-value{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:900;
  letter-spacing:-1px;color:var(--text-primary);line-height:1}
.card-value.mono{font-family:'JetBrains Mono',monospace;font-size:30px}
.card-sub{font-size:12px;color:var(--text-secondary);margin-top:6px;font-weight:500}

.card-glow-judo::after{content:'';position:absolute;top:-60px;right:-60px;width:160px;height:160px;
  background:radial-gradient(circle,var(--judo-gold-dim) 0%,transparent 70%);pointer-events:none}
.card-glow-swim::after{content:'';position:absolute;top:-60px;right:-60px;width:160px;height:160px;
  background:radial-gradient(circle,var(--swim-cyan-dim) 0%,transparent 70%);pointer-events:none}
.card-glow-hand::after{content:'';position:absolute;top:-60px;right:-60px;width:160px;height:160px;
  background:radial-gradient(circle,var(--hand-orange-dim) 0%,transparent 70%);pointer-events:none}
.card-glow-danger::after{content:'';position:absolute;top:-60px;right:-60px;width:160px;height:160px;
  background:radial-gradient(circle,rgba(255,62,62,0.12) 0%,transparent 70%);pointer-events:none}

/* SECTION TITLE */
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;color:var(--text-muted);margin-bottom:16px;
  display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* STAT BAR */
.stat-bar-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px}
.stat-bar-fill{height:100%;border-radius:2px;transition:width 1.2s cubic-bezier(0.16,1,0.3,1)}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase}
.badge-judo{background:var(--judo-gold-dim);color:var(--judo-gold);border:1px solid rgba(245,197,24,0.25)}
.badge-swim{background:var(--swim-cyan-dim);color:var(--swim-cyan);border:1px solid rgba(0,212,255,0.2)}
.badge-hand{background:var(--hand-orange-dim);color:var(--hand-orange);border:1px solid rgba(255,107,43,0.2)}
.badge-success{background:rgba(0,229,126,0.1);color:var(--success);border:1px solid rgba(0,229,126,0.2)}
.badge-danger{background:rgba(255,62,62,0.1);color:var(--danger);border:1px solid rgba(255,62,62,0.2)}
.badge-neutral{background:rgba(124,156,191,0.1);color:var(--neutral);border:1px solid rgba(124,156,191,0.2)}
.badge-amber{background:rgba(255,171,0,0.1);color:var(--amber);border:1px solid rgba(255,171,0,0.2)}

/* ALERT STRIP */
.alert-strip{border:1px solid rgba(255,62,62,0.3);background:rgba(255,62,62,0.05);
  border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:16px;
  animation:alert-glow 3s ease-in-out infinite}
.alert-amber{border-color:rgba(255,171,0,0.35);background:rgba(255,171,0,0.05);
  animation:amber-glow 3s ease-in-out infinite}
@keyframes alert-glow{0%,100%{box-shadow:none}50%{box-shadow:0 0 20px rgba(255,62,62,0.12)}}
@keyframes amber-glow{0%,100%{box-shadow:none}50%{box-shadow:0 0 20px rgba(255,171,0,0.1)}}

/* EVENT ROWS */
.event-row{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;
  padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.18s}
.event-row:hover{border-color:var(--border-bright);background:var(--bg-card-hover)}
.event-row.expanded{border-color:var(--border-bright)}
.event-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot-judo{background:var(--judo-gold);box-shadow:0 0 8px var(--judo-gold)}
.dot-swim{background:var(--swim-cyan);box-shadow:0 0 8px var(--swim-cyan)}
.dot-hand{background:var(--hand-orange);box-shadow:0 0 8px var(--hand-orange)}
.dot-health{background:var(--danger);box-shadow:0 0 8px var(--danger)}

/* MONTH DIVIDER */
.month-divider{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);padding:16px 0 8px;
  display:flex;align-items:center;gap:10px}
.month-divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* FILTER PILLS */
.filter-pill{padding:5px 14px;border-radius:999px;font-family:'JetBrains Mono',monospace;
  font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  border:1px solid var(--border);color:var(--text-muted);background:transparent;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.filter-pill:hover{border-color:var(--border-bright);color:var(--text-primary)}
.fp-all{border-color:var(--border-bright);color:var(--text-primary);background:var(--bg-card)}
.fp-judo{border-color:var(--judo-gold);color:var(--judo-gold);background:var(--judo-gold-dim)}
.fp-swim{border-color:var(--swim-cyan);color:var(--swim-cyan);background:var(--swim-cyan-dim)}
.fp-hand{border-color:var(--hand-orange);color:var(--hand-orange);background:var(--hand-orange-dim)}

/* RESULT TAGS */
.rtag-win{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;color:var(--judo-gold)}
.rtag-medal{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;color:#94a3b8}
.rtag-2eme{color:#60a5fa}
.rtag-records{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;color:var(--swim-cyan)}
.rtag-nc{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;color:var(--text-muted)}
.rtag-dsq{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;color:var(--danger)}

/* TACTIC TILE */
.tactic-tile{border:1px solid var(--border);border-radius:12px;padding:16px;background:var(--bg-surface)}
.tactic-tile-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}

/* GRIDS */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px}

/* RANKING */
.ranking-number{font-family:'Barlow Condensed',sans-serif;font-size:80px;font-weight:900;line-height:1;letter-spacing:-3px}

/* RECORD PILL */
.record-pill{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:999px;
  background:var(--judo-gold-dim);border:1px solid rgba(245,197,24,0.3);
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--judo-gold)}

/* ADV STARS */
.adv-stars{display:flex;gap:2px}
.adv-star{width:8px;height:8px;border-radius:1px}
.star-judo{background:var(--judo-gold)} .star-swim{background:var(--swim-cyan)} .star-hand{background:var(--hand-orange)}
.star-empty{background:var(--border)}

/* FADE */
.fade-up{animation:fadeUp 0.35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.no-scroll{scrollbar-width:none;-ms-overflow-style:none}
.no-scroll::-webkit-scrollbar{display:none}

/* DARK TOOLTIP RECHARTS */
.recharts-tooltip-wrapper{z-index:9999}

/* TIMELINE */
.tl-rail{position:relative;display:flex;overflow-x:auto;gap:0;padding:16px 0 24px;-webkit-overflow-scrolling:touch}
.tl-rail::before{content:'';position:absolute;top:52px;left:0;right:0;height:2px;background:var(--border)}
.tl-item{flex-shrink:0;width:140px;position:relative;display:flex;flex-direction:column;align-items:center;gap:0}
.tl-dot-wrap{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  border:2px solid var(--border);background:var(--bg-base);margin-top:43px;margin-bottom:8px;flex-shrink:0;z-index:2;position:relative}
.tl-dot-inner{width:8px;height:8px;border-radius:50%}
.tl-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;
  padding:8px 10px;width:128px;font-size:10px;transition:border-color .2s;cursor:default}
.tl-card:hover{border-color:var(--border-bright)}
.tl-date{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);font-weight:700;letter-spacing:1px;margin-bottom:4px}
.tl-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--text-primary);line-height:1.2;margin-bottom:4px}
.tl-result{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800}
/* volume bars on timeline */
.tl-vol-bar{position:absolute;top:0;left:50%;transform:translateX(-50%);width:36px;display:flex;flex-direction:column-reverse;gap:1px;align-items:center}

@media(max-width:900px){
  .sidebar{width:56px}
  .main-content{margin-left:56px;padding:20px 16px}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
  .topbar-title{font-size:26px}
}
</style>
</head>
<body>
<div id="root"></div>

<script>
window._RC = window.Recharts || {};
</script>

<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect } = React;
const RC = window._RC;
const AreaChart = RC.AreaChart; const Area = RC.Area;
const BarChart = RC.BarChart; const Bar = RC.Bar;
const LineChart = RC.LineChart; const Line = RC.Line;
const XAxis = RC.XAxis; const YAxis = RC.YAxis;
const CartesianGrid = RC.CartesianGrid;
const RTooltip = RC.Tooltip;
const ResponsiveContainer = RC.ResponsiveContainer;

// ── ICONS ─────────────────────────────────────────────────────────────────────
const Ico = ({ d, size = 20 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
    strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"
    dangerouslySetInnerHTML={{ __html: d }} />
);
const I = {
  cockpit:'<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
  bio:'<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>',
  judo:'<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0v-7z"/>',
  swim:'<path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.6 2 5 2 2.3 0 2.3-2 5-2"/><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.6 2 5 2 2.3 0 2.3-2 5-2"/><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.6 2 5 2 2.3 0 2.3-2 5-2"/>',
  hand:'<path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/>',
  cal:'<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
  tl:'<line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>',
  shield:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>',
  zap:'<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',
  clock:'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
  trending:'<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>',
  star:'<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',
  chevDown:'<polyline points="6 9 12 15 18 9"/>',
  chevUp:'<polyline points="18 15 12 9 6 15"/>',
  bone:'<path d="M17 2a3 3 0 0 1 3 3 3 3 0 0 1-3 3H7a3 3 0 0 1-3-3 3 3 0 0 1 3-3zm0 14a3 3 0 0 0 3 3 3 3 0 0 0-3-3H7a3 3 0 0 0-3 3 3 3 0 0 0 3-3"/>',
  arrowR:'<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>',
};

// ── PURE COMPONENTS ───────────────────────────────────────────────────────────
const SportDot = ({ sport, size = 10 }) => {
  const cls = sport === 'Judo' ? 'dot-judo' : sport === 'Natation' ? 'dot-swim' : sport === 'Handball' ? 'dot-hand' : 'dot-health';
  return <span className={`event-dot ${cls}`} style={{ width: size, height: size }} />;
};

const Badge = ({ type, text }) => {
  const cls = type === 'judo' ? 'badge-judo' : type === 'swim' ? 'badge-swim' : type === 'hand' ? 'badge-hand'
    : type === 'success' ? 'badge-success' : type === 'danger' ? 'badge-danger' : type === 'amber' ? 'badge-amber' : 'badge-neutral';
  return <span className={`badge ${cls}`}>{text}</span>;
};

const StatBar = ({ value, color = 'var(--judo-gold)', max = 100 }) => (
  <div className="stat-bar-track">
    <div className="stat-bar-fill" style={{ width: `${(value / max) * 100}%`, background: color }} />
  </div>
);

const AdvStars = ({ count, sport, max = 5 }) => {
  const cls = sport === 'Judo' ? 'star-judo' : sport === 'Natation' ? 'star-swim' : 'star-hand';
  return (
    <div className="adv-stars">
      {Array.from({ length: max }).map((_, i) => (
        <span key={i} className={`adv-star ${i < count ? cls : 'star-empty'}`} />
      ))}
    </div>
  );
};

const ResultTag = ({ result }) => {
  if (!result) return null;
  const r = result.toUpperCase();
  if (r.includes('1ER')) return <span className="rtag-win">1ER 🥇</span>;
  if (r.includes('2ÈME') || r.includes('2EME')) return <span className="rtag-medal rtag-2eme">2ÈME 🥈</span>;
  if (r.includes('3ÈME') || r.includes('3EME')) return <span className="rtag-medal">3ÈME 🥉</span>;
  if (r.includes('RECORDS') || r.includes('RECORD')) return <span className="rtag-records">⚡ RECORDS</span>;
  if (r.includes('DSQ')) return <span className="rtag-dsq">DSQ</span>;
  return <span className="rtag-nc">{result}</span>;
};

const DarkTooltip = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background: 'var(--bg-card)', border: '1px solid var(--border-bright)', borderRadius: 8, padding: '10px 14px', fontFamily: 'JetBrains Mono,monospace', fontSize: 11 }}>
      <p style={{ color: 'var(--text-muted)', marginBottom: 6, letterSpacing: 1 }}>{label}</p>
      {payload.map((p, i) => <p key={i} style={{ color: p.color, margin: '2px 0' }}>{p.name}: <strong>{p.value}</strong></p>)}
    </div>
  );
};

const SectionTitle = ({ children }) => <div className="section-title">{children}</div>;

// Arc gauge semi-circle
const ArcGauge = ({ value, color, size = 90, stroke = 8 }) => {
  const r = (size / 2) - stroke;
  const circ = 2 * Math.PI * r;
  const arc = circ * 0.72;
  const filled = arc * (value / 100);
  const off = -(arc * 0.11);
  return (
    <div style={{ position: 'relative', width: size, height: size * 0.65, overflow: 'hidden' }}>
      <svg width={size} height={size} style={{ position: 'absolute', top: 0, left: 0 }}>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none"
          stroke="var(--border)" strokeWidth={stroke}
          strokeDasharray={`${arc} ${circ}`} strokeDashoffset={off}
          transform={`rotate(-90 ${size / 2} ${size / 2})`} strokeLinecap="round" />
        <circle cx={size / 2} cy={size / 2} r={r} fill="none"
          stroke={color} strokeWidth={stroke}
          strokeDasharray={`${filled} ${circ}`} strokeDashoffset={off}
          transform={`rotate(-90 ${size / 2} ${size / 2})`} strokeLinecap="round"
          style={{ filter: `drop-shadow(0 0 6px ${color}80)`, transition: 'stroke-dasharray 1.2s cubic-bezier(0.16,1,0.3,1)' }} />
      </svg>
      <div style={{ position: 'absolute', bottom: 0, left: '50%', transform: 'translateX(-50%)', textAlign: 'center' }}>
        <span style={{ fontFamily: 'Barlow Condensed,sans-serif', fontSize: size * 0.22, fontWeight: 900, color, lineHeight: 1 }}>{value}</span>
      </div>
    </div>
  );
};

                <div style={{ fontFamily: 'JetBrains Mono', fontSize: 10, color: 'var(--text-muted)', marginBottom: 2 }}>{e.month} · {e.date}</div>
                <div style={{ fontFamily: 'Barlow Condensed', fontSize: 16, fontWeight: 700, color: e.next ? 'var(--swim-cyan)' : 'var(--text-primary)' }}>
                  {e.next && '→ '}{e.name}
                </div>
                <div style={{ fontFamily: 'JetBrains Mono', fontSize: 10, color: 'var(--text-muted)', marginTop: 2 }}>{e.address}{e.time && e.time !== 'À définir' ? ` · ${e.time}` : ''}{e.drive && e.drive !== 'À définir' ? ` · ${e.drive} trajet` : ''}</div>
              </div>
              <Badge type={e.sport === 'Judo' ? 'judo' : e.sport === 'Natation' ? 'swim' : 'hand'} text={e.sport} />
              {e.next && <Badge type="amber" text="PROCHAINE" />}
            </div>
          ))}
        </div>
      </div>

      {/* Bilan chiffres */}
      <div className="grid-4" style={{ gap: 12 }}>
        {[{ l: 'Compétitions', v: '16', c: 'var(--text-primary)' }, { l: 'Podiums +', v: '12', c: 'var(--judo-gold)' }, { l: 'Records PR', v: '2', c: 'var(--swim-cyan)' }, { l: 'Win Rate Judo', v: '91.7%', c: 'var(--judo-gold)' }].map((k, i) => (
          <div key={i} className="card"><div className="card-label">{k.l}</div><div className="card-value" style={{ color: k.c, fontSize: 36 }}>{k.v}</div></div>
        ))}
      </div>

      {/* Filtres */}
      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
        {['ALL', 'Judo', 'Natation', 'Handball'].map(f => (
          <button key={f} onClick={() => setFilter(f)} className={fpClass(f)}>
            {f === 'ALL' ? 'TOUS' : f.toUpperCase()}
          </button>
        ))}
        <span style={{ fontFamily: 'JetBrains Mono', fontSize: 10, color: 'var(--text-muted)', marginLeft: 'auto', alignSelf: 'center' }}>Source : onglet Calendrier Saison uniquement</span>
      </div>

      {/* Résultats */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
        {Object.entries(grouped).reverse().map(([month, evts]) => (
          <div key={month}>
            <div className="month-divider">{month}</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {evts.map(e => (
                <div key={e.id}>
                  <div className={`event-row ${expId === e.id ? 'expanded' : ''}`} onClick={() => setExpId(expId === e.id ? null : e.id)}>
                    <SportDot sport={e.sport} size={10} />
                    <div style={{ flex: 1 }}>
                      <div style={{ fontFamily: 'JetBrains Mono', fontSize: 10, color: 'var(--text-muted)', marginBottom: 2 }}>{e.date} · {e.sport}</div>
                      <div style={{ fontFamily: 'Barlow Condensed', fontSize: 16, fontWeight: 700, color: 'var(--text-primary)' }}>{e.name}</div>
                    </div>
                    <AdvStars count={e.adv} sport={e.sport} max={5} />
                    <ResultTag result={e.result} />
                    <Ico d={expId === e.id ? I.chevUp : I.chevDown} size={16} />
                  </div>
                  {expId === e.id && (
                    <div style={{ background: 'var(--bg-surface)', border: '1px solid var(--border-bright)', borderTop: 'none', borderRadius: '0 0 12px 12px', padding: '14px 18px', marginBottom: 4 }}>
                      <div style={{ fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.6, marginBottom: e.com ? 10 : 0 }}>{e.desc}</div>
                      {e.com && <div style={{ fontFamily: 'JetBrains Mono', fontSize: 11, color: 'var(--text-muted)', lineHeight: 1.6, borderTop: '1px solid var(--border)', paddingTop: 10 }}>{e.com}</div>}
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

// ── TIMELINE ──────────────────────────────────────────────────────────────────

    { month:'Jan 26', date:'24/01', type:'Handball', label:'U9 Issy', sub:'NC · Surclassé ⭐⭐⭐⭐⭐', color:'var(--hand-orange)' },

  const byMonth = months.reduce((a, m) => { a[m] = timelineEvents.filter(e => e.month === m); return a; }, {});

  const dotColor = type => type === 'Judo' ? 'var(--judo-gold)' : type === 'Natation' ? 'var(--swim-cyan)' : type === 'Handball' ? 'var(--hand-orange)' : 'var(--danger)';

      {/* Légende */}

        {[['Judo', 'var(--judo-gold)'], ['Natation', 'var(--swim-cyan)'], ['Handball', 'var(--hand-orange)'], ['Santé/Blessure', 'var(--danger)']].map(([l, c]) => (

          <div style={{ display: 'grid', gridTemplateColumns: `repeat(${months.length}, 1fr)`, gap: 0, marginBottom: 0, height: 60, alignItems: 'flex-end' }}>

                  {/* Liste événements */}
                  <div style={{ paddingTop: 12, display: 'flex', flexDirection: 'column', gap: 5 }}>
                    {evts.map((e, ei) => (

                          <div style={{ width: 5, height: 5, borderRadius: '50%', background: e.color, flexShrink: 0, boxShadow: `0 0 4px ${e.color}` }} />
                          <span style={{ fontFamily: 'JetBrains Mono', fontSize: 8, color: 'var(--text-muted)', letterSpacing: 0.5 }}>{e.date}</span>
                        </div>
                        <div style={{ fontFamily: 'Barlow Condensed', fontSize: 12, fontWeight: 700, color: e.type === 'health' ? 'var(--danger)' : 'var(--text-primary)', lineHeight: 1.2, marginBottom: 2 }}>{e.label}</div>

            <div style={{ width: 12, height: 8, borderRadius: 2, background: c }} />
            <span style={{ fontFamily: 'JetBrains Mono', fontSize: 9, color: 'var(--text-muted)' }}>{l}</span>
          </div>
        ))}
      </div>

      {/* Résumé narratif */}
      <div className="card" style={{ borderLeft: '3px solid var(--neutral)' }}>

      </div>
    </div>
  );
};

// ── APP ───────────────────────────────────────────────────────────────────────
const App = () => {
  const [tab, setTab] = useState('cockpit');
  const goTo = (t) => setTab(t);

  const renderContent = () => {
    switch (tab) {
      case 'cockpit': return <CockpitTab goTo={goTo} />;
      case 'bio': return <BioTab />;
      case 'judo': return <JudoTab />;
      case 'swim': return <SwimTab />;
      case 'hand': return <HandTab />;
      case 'cal': return <CalTab />;
      case 'tl': return <TimelineTab />;
      default: return <CockpitTab goTo={goTo} />;
    }
  };

  return (
    <div className="os-layout">
      {/* SIDEBAR */}
      <aside className="sidebar">
        <div style={{ paddingBottom: 18, marginBottom: 8, borderBottom: '1px solid var(--border)', width: '100%', display: 'flex', justifyContent: 'center' }}>
          <span style={{ fontFamily: 'Barlow Condensed,sans-serif', fontWeight: 900, fontSize: 13, letterSpacing: 2, color: 'var(--text-primary)', writingMode: 'vertical-rl', transform: 'rotate(180deg)' }}>LÉO·OS</span>
        </div>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            className={`nav-btn ${tab === t.id ? 'active ' + t.aClass : ''}`}
            title={t.label}>
            <Ico d={I[t.icon]} size={19} />
            <span className="nav-tooltip">{t.label}<br /><span style={{ color: 'var(--text-muted)', fontWeight: 400 }}>{t.sub}</span></span>
          </button>
        ))}
      </aside>

      {/* MAIN */}
      <main className="main-content fade-up" key={tab}>
        <div className="topbar">
          <div>
            <div className="topbar-section-name">{SECTION[tab]}</div>
            <div className="topbar-title">MODOT LÉO <span style={{ color: 'var(--text-muted)', fontWeight: 300 }}>· 7 ANS · 2019</span></div>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <div className="status-pill"><span className="dot" /><span>MAJ 13/05/2026</span></div>
            <div className="status-pill" style={{ borderColor: 'rgba(0,212,255,0.3)', color: 'var(--swim-cyan)' }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--swim-cyan)', animation: 'pulse-dot 2s infinite', display: 'inline-block' }} />
              <span>J3 Avenirs · 31/05</span>
            </div>
          </div>
        </div>
        {renderContent()}
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(React.StrictMode, null, React.createElement(App))
);
</script>
